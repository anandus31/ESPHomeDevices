    id: my_led
    pin: GPIO13
    num_leds: 5
    type: GRB
    variant: WS2812
    name: "WS2812 LED Strip"
    effects: 
      - addressable_rainbow: 
          name: Rainbow Effect
      - addressable_color_wipe: 
