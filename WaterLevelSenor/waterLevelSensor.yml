# Define the virtual switch for GUI control

  - platform: template
    name: "Control Switch"
    id: control_switch
    optimistic: true

# Define the GPIO switch that will be controlled with a delay
  - platform: gpio
    pin: GPIO12  # Replace GPIOXX with the actual GPIO pin number for the delayed output
    name: "Delayed Output"
    id: delayed_output

# Automations to handle the delay
interval:
  - interval: 1s  # Check every second
    then:
      if:
        condition:
          switch.is_on: control_switch
        then:
          - delay: 2s  # Delay for 2 seconds before turning on the GPIO switch
          - switch.turn_on: delayed_output
        else:
          - delay: 2s  # Delay for 2 seconds before turning off the GPIO switch
          - switch.turn_off: delayed_output
