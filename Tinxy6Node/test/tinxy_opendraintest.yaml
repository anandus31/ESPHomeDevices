esphome:
  name: tinxy-opendraintest
  friendly_name: tinxy-opendraintest

esp8266:
  board: esp12e

# Enable logging
logger:
  baud_rate: 0
  level: verbose

# Enable web server
web_server:
  port: 80

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true

switch:
  - platform: gpio
    name: "TX Pin (Input Mode)"
    pin:
      number: GPIO1
      mode: INPUT

  - platform: gpio
    name: "RX Pin (Input Mode)"
    pin:
      number: GPIO3
      mode: INPUT
