esphome:
  name: tinxy6node
  friendly_name: Tinxy 6 Node

esp8266:
  board: esp12e
  restore_from_flash: true

logger:
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s

uart:
  id: uart_bus
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 115200
  debug:
    dummy_receiver: true
    direction: RX
    after:
      delimiter: "\n"
    sequence:
      - lambda: |-
          UARTDebug::log_string(direction, bytes);
          std::string str(bytes.begin(), bytes.end());
          if (str.find(";11;") != std::string::npos) {
            id(relay_1).publish_state(true);
          } else if (str.find(";10;") != std::string::npos) {
            id(relay_1).publish_state(false);
          } else if (str.find(";21;") != std::string::npos) {
            id(relay_2).publish_state(true);
          } else if (str.find(";20;") != std::string::npos) {
            id(relay_2).publish_state(false);
          } else if (str.find(";31;") != std::string::npos) {
            id(relay_3).publish_state(true);
          } else if (str.find(";30;") != std::string::npos) {
            id(relay_3).publish_state(false);
          } else if (str.find(";41;") != std::string::npos) {
            id(relay_4).publish_state(true);
          } else if (str.find(";40;") != std::string::npos) {
            id(relay_4).publish_state(false);
          } else if (str.find(";51;") != std::string::npos) {
            id(relay_5).publish_state(true);
          } else if (str.find(";50;") != std::string::npos) {
            id(relay_5).publish_state(false);
          } else if (str.find(";61;") != std::string::npos) {
            id(relay_6).publish_state(true);
          } else if (str.find(";60;") != std::string::npos) {
            id(relay_6).publish_state(false);
          }

switch:
  - platform: template
    id: relay_1
    name: "Tinxy Switch 1"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#1100#"
    turn_off_action:
      - uart.write: "#1000#"

  - platform: template
    id: relay_2
    name: "Tinxy Switch 2"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#2100#"
    turn_off_action:
      - uart.write: "#2000#"

  - platform: template
    id: relay_3
    name: "Tinxy Switch 3"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#3100#"
    turn_off_action:
      - uart.write: "#3000#"

  - platform: template
    id: relay_4
    name: "Tinxy Switch 4"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#4100#"
    turn_off_action:
      - uart.write: "#4000#"

  - platform: template
    id: relay_5
    name: "Tinxy Switch 5"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#5100#"
    turn_off_action:
      - uart.write: "#5000#"

  - platform: template
    id: relay_6
    name: "Tinxy Switch 6"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#6100#"
    turn_off_action:
      - uart.write: "#6000#"
