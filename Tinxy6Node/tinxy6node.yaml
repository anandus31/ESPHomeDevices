esphome:
  name: tinxy6node
  friendly_name: Tinxy 6 Node
  on_boot:
    priority: -100
    then:
      - if:
          condition:
            - switch.is_on: relay_1
          then:
            - uart.write: "#1100#"
          else:
            - uart.write: "#1000#"
      - if:
          condition:
            - switch.is_on: relay_2
          then:
            - uart.write: "#2100#"
          else:
            - uart.write: "#2000#"
      - if:
          condition:
            - switch.is_on: relay_3
          then:
            - uart.write: "#3100#"
          else:
            - uart.write: "#3000#"
      - if:
          condition:
            - switch.is_on: relay_4
          then:
            - uart.write: "#4100#"
          else:
            - uart.write: "#4000#"
      - if:
          condition:
            - switch.is_on: relay_5
          then:
            - uart.write: "#5100#"
          else:
            - uart.write: "#5000#"
      - if:
          condition:
            - switch.is_on: relay_6
          then:
            - uart.write: "#6100#"
          else:
            - uart.write: "#6000#"

esp8266:
  board: esp12e
  restore_from_flash: true

logger:
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  power_save_mode: none
  fast_connect: true

uart:
  id: uart_bus
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 115200

  debug:
    dummy_receiver: true
    direction: RX
    after:
      delimiter: "\n"
    sequence:
      - lambda: |-
          if (bytes.size() < 4) return;
          if (bytes[1] == '1' && bytes[2] == '1') { id(relay_1).publish_state(true); return; }
          if (bytes[1] == '1' && bytes[2] == '0') { id(relay_1).publish_state(false); return; }
          if (bytes[1] == '2' && bytes[2] == '1') { id(relay_2).publish_state(true); return; }
          if (bytes[1] == '2' && bytes[2] == '0') { id(relay_2).publish_state(false); return; }
          if (bytes[1] == '3' && bytes[2] == '1') { id(relay_3).publish_state(true); return; }
          if (bytes[1] == '3' && bytes[2] == '0') { id(relay_3).publish_state(false); return; }
          if (bytes[1] == '4' && bytes[2] == '1') { id(relay_4).publish_state(true); return; }
          if (bytes[1] == '4' && bytes[2] == '0') { id(relay_4).publish_state(false); return; }
          if (bytes[1] == '5' && bytes[2] == '1') { id(relay_5).publish_state(true); return; }
          if (bytes[1] == '5' && bytes[2] == '0') { id(relay_5).publish_state(false); return; }
          if (bytes[1] == '6' && bytes[2] == '1') { id(relay_6).publish_state(true); return; }
          if (bytes[1] == '6' && bytes[2] == '0') { id(relay_6).publish_state(false); return; }

switch:
  - platform: template
    id: relay_1
    name: "Tinxy Switch 1"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#1100#"
    turn_off_action:
      - uart.write: "#1000#"

  - platform: template
    id: relay_2
    name: "Tinxy Switch 2"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#2100#"
    turn_off_action:
      - uart.write: "#2000#"

  - platform: template
    id: relay_3
    name: "Tinxy Switch 3"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#3100#"
    turn_off_action:
      - uart.write: "#3000#"

  - platform: template
    id: relay_4
    name: "Tinxy Switch 4"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#4100#"
    turn_off_action:
      - uart.write: "#4000#"

  - platform: template
    id: relay_5
    name: "Tinxy Switch 5"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#5100#"
    turn_off_action:
      - uart.write: "#5000#"

  - platform: template
    id: relay_6
    name: "Tinxy Switch 6"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: "#6100#"
    turn_off_action:
      - uart.write: "#6000#"

