esphome:
  name: esp32c3_mini_touch_switch

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Manual IP (optional - can help with connection issues)
  # manual_ip:
  #   static_ip: 192.168.1.100
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0

# Enable fallback hotspot (captive portal) in case wifi connection fails
captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# Enable OTA updates
ota:
  platform: esphome
  password: !secret ota_password

# Enable web server
web_server:
  port: 80

# Board specific configuration
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Touch Switches
binary_sensor:
  - platform: gpio
    pin: 4
    name: "Touch Switch 1"
    id: touch_switch_1
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - switch.toggle: toggle_switch_1
  - platform: gpio
    pin: 3
    name: "Touch Switch 2"
    id: touch_switch_2
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - switch.toggle: toggle_switch_2

# Toggle Switches (change state on each touch)
switch:
  - platform: template
    name: "Toggle Switch 1"
    id: toggle_switch_1
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    device_class: switch
    icon: "mdi:toggle-switch"
  - platform: template
    name: "Toggle Switch 2"
    id: toggle_switch_2
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    device_class: switch
    icon: "mdi:toggle-switch"

# Device information for Home Assistant
text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

# Device sensors for Home Assistant
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
